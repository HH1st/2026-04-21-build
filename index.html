<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Frost Three</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <div id="scene-root" class="scene-root" aria-hidden="true"></div>
    <div class="vignette"></div>
    <div class="renderer-switch" aria-label="渲染器切换">
      <label class="renderer-switch__label" for="renderer-kind">Renderer</label>
      <select id="renderer-kind" class="renderer-switch__select">
        <option value="fluid">Fluid</option>
        <option value="nebula">Nebula</option>
      </select>
    </div>
    <div class="controls-panel">
      <button id="start-vad" class="controls-panel__button" type="button">
        Enable mic
      </button>
      <p id="mic-status" class="controls-panel__status">VAD inactive</p>
    </div>
    <div class="state-badge" aria-live="polite">
      <span class="state-badge__label">State</span>
      <strong id="agent-state">idle</strong>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
